<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Cek Status Gizi Balita (WHO)</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      padding: 20px;
    }
    .container {
      max-width: 420px;
      background: white;
      padding: 25px;
      border-radius: 15px;
      margin: auto;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    h2 { text-align: center; }
    label { font-weight: 600; }
    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: #6c63ff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      font-weight: bold;
    }
    .normal { background: #d4edda; }
    .danger { background: #f8d7da; }
  </style>
</head>
<body>

<div class="container">
  <h2><i class="fa-solid fa-baby"></i> Cek Status Balita (WHO)</h2>

  <label>Jenis Kelamin</label>
  <select id="jk">
    <option value="L">Laki-laki</option>
    <option value="P">Perempuan</option>
  </select>

  <label>Umur (bulan)</label>
  <input type="number" id="umur">

  <label>Berat Badan (kg)</label>
  <input type="number" id="berat">

  <label>Tinggi Badan (cm)</label>
  <input type="number" id="tinggi">

  <button onclick="hitung()">Hitung</button>

  <div class="result" id="hasil"></div>
</div>

<script>
// DATA WHO CONTOH (BB/U & TB/U)
const WHO_BB = {
  L: {
    24: {L: -0.1, M: 12.2, S: 0.09}
  },
  P: {
    24: {L: -0.1, M: 11.5, S: 0.09}
  }
};

const WHO_TB = {
  L: {
    24: {L: 1, M: 87.1, S: 0.04}
  },
  P: {
    24: {L: 1, M: 85.7, S: 0.04}
  }
};

function zScore(x, L, M, S) {
  if (L === 0) return Math.log(x / M) / S;
  return (Math.pow(x / M, L) - 1) / (L * S);
}

function kategoriBB(z) {
  if (z < -3) return "Gizi Buruk";
  if (z < -2) return "Gizi Kurang";
  if (z <= 2) return "Normal";
  return "Gizi Lebih";
}

function kategoriTB(z) {
  if (z < -3) return "Stunting Berat";
  if (z < -2) return "Stunting";
  if (z <= 2) return "Normal";
  return "Tinggi";
}

function hitung() {
  let umur = document.getElementById("umur").value;
  let jk = document.getElementById("jk").value;
  let bb = parseFloat(document.getElementById("berat").value);
  let tb = parseFloat(document.getElementById("tinggi").value);

  let hasil = document.getElementById("hasil");

//  if (!WHO_BB[jk][umur] || !WHO_TB[jk][umur]) {
//    hasil.className = "result danger";
//    hasil.innerHTML = "Data WHO umur ini belum tersedia";
 //   return;
  }

  let bbData = WHO_BB[jk][umur];
  let tbData = WHO_TB[jk][umur];

  let zBB = zScore(bb, bbData.L, bbData.M, bbData.S);
  let zTB = zScore(tb, tbData.L, tbData.M, tbData.S);

  let statusBB = kategoriBB(zBB);
  let statusTB = kategoriTB(zTB);

  hasil.className = "result " + (zBB < -2 || zTB < -2 ? "danger" : "normal");
  hasil.innerHTML = `
    BB/U: ${zBB.toFixed(2)} (${statusBB}) <br>
    TB/U: ${zTB.toFixed(2)} (${statusTB})
  `;
}
</script>

</body>
</html>
