.container {
  max-width: 420px;
  background: white;
  padding: 25px;
  border-radius: 15px;
  margin: 50px auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  animation: fadeIn 0.8s ease-in-out;
}

h2 {
  text-align: center;
  color: #333;
}

label {
  margin-top: 10px;
  display: block;
  font-weight: 500;
  color: #555;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
  transition: 0.3s;
}

input:focus {
  border-color: #4facfe;
  outline: none;
  box-shadow: 0 0 5px rgba(79,172,254,0.5);
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 20px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #43e97b, #38f9d7);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.result {
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  font-weight: bold;
  display: none;
  animation: fadeIn 0.5s ease-in-out;
}

.normal {
  background: #d4edda;
  color: #155724;
}

.warning {
  background: #fff3cd;
  color: #856404;
}

.danger {
  background: #f8d7da;
  color: #721c24;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}

<body>

<div class="container">
  <h2>👶 Cek Status Gizi Balita</h2>

<label>Umur (bulan)</label> <input type="number" id="umur" placeholder="Contoh: 12">

<label>Tinggi Badan (cm)</label> <input type="number" id="tinggi" placeholder="Contoh: 75">

<label>Berat Badan (kg)</label> <input type="number" id="berat" placeholder="Contoh: 9">

<label>Jenis Kelamin (kg)</label> <input type="text" id="jk">

<button onclick="hitung()">Hitung Status</button>

  <div class="result" id="hasil"></div>
</div>

<script>
function hitung() {
  let umur = parseFloat(document.getElementById("umur").value);
  let tinggi = parseFloat(document.getElementById("tinggi").value);
  let berat = parseFloat(document.getElementById("berat").value);
  let hasil = document.getElementById("hasil");

  if (isNaN(umur) || isNaN(tinggi) || isNaN(berat)) {
    hasil.style.display = "block";
    hasil.className = "result warning";
    hasil.innerText = "⚠️ Isi semua data dengan benar!";
    return;
  }

  let standarTinggi = 50 + (umur * 0.7); 
  let standarBerat = 3 + (umur * 0.25);

  let zTinggi = (tinggi - standarTinggi) / 3;
  let zBerat = (berat - standarBerat) / 2;

  let statusTinggi = "";
  let statusBerat = "";
  let kategori = "normal";

  if (zTinggi < -3) {
    statusTinggi = "Sangat Pendek";
    kategori = "danger";
  } else if (zTinggi < -2) {
    statusTinggi = "Stunting";
    kategori = "warning";
  } else {
    statusTinggi = "Normal";
  }

  if (zBerat < -3) {
    statusBerat = "Gizi Buruk";
    kategori = "danger";
  } else if (zBerat < -2) {
    statusBerat = "Gizi Kurang";
    if (kategori !== "danger") kategori = "warning";
  } else {
    statusBerat = "Gizi Baik";
  }

  hasil.style.display = "block";
  hasil.className = "result " + kategori;
  hasil.innerHTML =
    "📏 Tinggi: " + statusTinggi + "<br>" +
    "⚖️ Berat: " + statusBerat;
}
</script>

</body>
</html>
