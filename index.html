function zScore(x, L, M, S) {
  if (L === 0) return Math.log(x / M) / S;
  return (Math.pow(x / M, L) - 1) / (L * S);
}

function kategoriBB(z) {
  if (z < -3) return "Gizi Buruk";
  if (z < -2) return "Gizi Kurang";
  if (z <= 2) return "Normal";
  return "Gizi Lebih";
}

function kategoriTB(z) {
  if (z < -3) return "Stunting Berat";
  if (z < -2) return "Stunting";
  if (z <= 2) return "Normal";
  return "Tinggi";
}

function hitung() {
  let umur = document.getElementById("umur").value;
  let jk = document.getElementById("jk").value;
  let bb = parseFloat(document.getElementById("berat").value);
  let tb = parseFloat(document.getElementById("tinggi").value);

  let hasil = document.getElementById("hasil");

  if (!WHO_BB[jk][umur] || !WHO_TB[jk][umur]) {
    hasil.className = "result danger";
    hasil.innerHTML = "Data WHO umur ini belum tersedia";
    return;
  }

  let bbData = WHO_BB[jk][umur];
  let tbData = WHO_TB[jk][umur];

  let zBB = zScore(bb, bbData.L, bbData.M, bbData.S);
  let zTB = zScore(tb, tbData.L, tbData.M, tbData.S);

  let statusBB = kategoriBB(zBB);
  let statusTB = kategoriTB(zTB);

  hasil.className = "result " + (zBB < -2 || zTB < -2 ? "danger" : "normal");
  hasil.innerHTML = `
    BB/U: ${zBB.toFixed(2)} (${statusBB}) <br>
    TB/U: ${zTB.toFixed(2)} (${statusTB}) <br><br>

    KESIMPULAN : BERAT BADAN BAYI ANDA TERMASUK ${statusBB}, DAN TINGGI BADAN BAYI ANDA TERMASUK ${statusTB}
  `;
}
</script>

</body>
