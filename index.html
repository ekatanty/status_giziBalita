<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Cek Status Gizi Balita</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      padding: 20px;
    }

    .container {
      max-width: 420px;
      background: white;
      padding: 25px;
      border-radius: 15px;
      margin: auto;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      animation: fadeIn 0.8s ease-in-out;
    }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }

    label {
      font-weight: 600;
      color: #555;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
      transition: 0.3s;
    }

    input:focus {
      border-color: #6c63ff;
      outline: none;
      box-shadow: 0 0 5px rgba(108,99,255,0.5);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: #6c63ff;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #574fd6;
      transform: scale(1.03);
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      font-weight: bold;
      text-align: center;
      animation: fadeIn 0.5s ease-in-out;
    }

    .normal {
      background: #d4edda;
      color: #155724;
    }

    .warning {
      background: #fff3cd;
      color: #856404;
    }

    .danger {
      background: #f8d7da;
      color: #721c24;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h2><i class="fa-solid fa-baby"></i> Cek Status Balita</h2>

  <label>Umur (bulan)</label>
  <input type="number" id="umur">

  <label>Tinggi Badan (cm)</label>
  <input type="number" id="tinggi">

  <label>Berat Badan (kg)</label>
  <input type="number" id="berat">

<label>Jenis Kelamin</label> <select id="jk">

  <option value="">-- Pilih Jenis Kelamin --</option>
  <option value="l">Laki-laki</option>
  <option value="p">Perempuan</option>
</select>


  <button onclick="hitung()"><i class="fa-solid fa-calculator"></i> Hitung</button>

  <div class="result" id="hasil"></div>
</div>

<script>
function hitung() {
  let umur = parseFloat(document.getElementById("umur").value);
  let tinggi = parseFloat(document.getElementById("tinggi").value);
  let berat = parseFloat(document.getElementById("berat").value);

  let hasil = document.getElementById("hasil");

  if (!umur || !tinggi || !berat) {
    hasil.className = "result warning";
    hasil.innerHTML = "⚠️ Isi semua data!";
    return;
  }

  let standarTinggi = 50 + (umur * 0.7);
  let standarBerat = 3 + (umur * 0.25);

  let zTinggi = (tinggi - standarTinggi) / 3;
  let zBerat = (berat - standarBerat) / 2;

  let statusTinggi = zTinggi < -2 ? "Stunting" : "Normal";
  let statusBerat = zBerat < -2 ? "Gizi Kurang" : "Gizi Baik";

  let kategori = "normal";
  if (statusTinggi === "Stunting" || statusBerat === "Gizi Kurang") {
    kategori = "danger";
  }

  hasil.className = "result " + kategori;
  hasil.innerHTML = `
    <i class="fa-solid fa-chart-line"></i><br>
    Status Tinggi: ${statusTinggi} <br>
    Status Berat: ${statusBerat}
  `;
}
</script>

</body>
</html>
